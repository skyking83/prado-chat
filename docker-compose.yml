# Production docker-compose for TrueNAS / Docker Hub deployment
# Images: skyking83/prado-chat-backend and skyking83/prado-chat-frontend

version: '3.8'

services:
  backend:
    image: skyking83/prado-chat-backend:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - RESEND_API_KEY=${RESEND_API_KEY:-your_resend_api_key_here}
      - GIPHY_API_KEY=${GIPHY_API_KEY:-your_giphy_api_key_here}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-BHN8Vik38ScfBP8IaE8jRS8Tbk9SG-tcBVMCBgMkxFOKkHHHCbhAphJhbqG5-1T_rcVMbg-75WRNUR39gn38hVQ}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-uy6VBze_TTongVazJwtAfCQg5TrVyR0OdEXJcnXL8Tc}
    volumes:
      # Bind mounts to TrueNAS datasets — survives image updates
      - /mnt/pool1/app_data/prado-chat-data:/app/data
      - /mnt/pool1/app_data/prado-chat-uploads:/app/src/uploads

  frontend:
    image: skyking83/prado-chat-frontend:latest
    restart: unless-stopped
    ports:
      - "30099:80"
    depends_on:
      - backend

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
    restart: unless-stopped

