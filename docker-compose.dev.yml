version: '3.8'

services:
  backend:
    image: node:20-alpine
    container_name: prado-backend-dev
    working_dir: /app
    command: sh -c "apk add --no-cache ffmpeg && npm install --legacy-peer-deps && npm run dev"
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-BHN8Vik38ScfBP8IaE8jRS8Tbk9SG-tcBVMCBgMkxFOKkHHHCbhAphJhbqG5-1T_rcVMbg-75WRNUR39gn38hVQ}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-uy6VBze_TTongVazJwtAfCQg5TrVyR0OdEXJcnXL8Tc}
    volumes:
      # Map the local Windows directory to the container for hot-reloading
      - ./backend:/app
      # Use an anonymous volume for node_modules to prevent Windows binary (e.g., bcrypt/sqlite3) bleeding into the Linux container!
      - /app/node_modules
      # Persist SQLite data and physical uploads locally during developer testing
      - ./backend/data:/app/data
      - ./backend/src/uploads:/app/src/uploads

  frontend:
    image: node:20-alpine
    container_name: prado-frontend-dev
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  coturn:
    image: coturn/coturn:latest
    container_name: prado-coturn-dev
    restart: unless-stopped
    network_mode: host
    command:
      - "-n"
      - "--listening-port=3478"
      - "--realm=localhost"
      - "--user=prado:prado-turn-secret"
      - "--lt-cred-mech"
      - "--fingerprint"
      - "--total-quota=100"
      - "--max-bps=0"
      - "--min-port=49152"
      - "--max-port=49200"
      - "--no-tls"
      - "--no-dtls"
      - "--no-multicast-peers"
      - "--log-file=stdout"
