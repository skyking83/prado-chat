version: '3.8'

services:
  backend:
    image: node:20-alpine
    container_name: prado-backend-dev
    working_dir: /app
    command: sh -c "apk add --no-cache ffmpeg && npm install --legacy-peer-deps && npm run dev"
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - RESEND_API_KEY=${RESEND_API_KEY:-your_resend_api_key_here}
      - GIPHY_API_KEY=${GIPHY_API_KEY:-your_giphy_api_key_here}
    volumes:
      # Map the local Windows directory to the container for hot-reloading
      - ./backend:/app
      # Use an anonymous volume for node_modules to prevent Windows binary (e.g., bcrypt/sqlite3) bleeding into the Linux container!
      - /app/node_modules
      # Persist SQLite data and physical uploads locally during developer testing
      - ./backend/data:/app/data
      - ./backend/src/uploads:/app/src/uploads

  frontend:
    image: node:20-alpine
    container_name: prado-frontend-dev
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
