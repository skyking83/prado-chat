# Prado Chat - coturn TURN server configuration
# This config is mounted into the coturn container

# TURN listener port
listening-port=3478

# Realm (must match the domain or be generic for dev)
realm=prado-chat

# Use fingerprint for TURN messages
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Static user credentials for TURN
# Format: username:password
# In production, use a more secure credential or dynamic secrets
user=prado:prado-turn-secret

# Total quota of allocations (0 = unlimited)
total-quota=100

# Max bytes-per-second bandwidth per session (0 = unlimited)
max-bps=0

# UDP relay port range (keep small for firewall friendliness)
min-port=49152
max-port=49200

# Logging
log-file=stdout
verbose

# No TLS for dev (in production, configure cert/pkey)
no-tls
no-dtls

# Allow localhost relaying for dev
no-multicast-peers
