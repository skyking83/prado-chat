# Prado Chat - coturn TURN server configuration
# This config is mounted into the coturn container
#
# SETUP: Update 'realm' and 'user' below to match your deployment,
# then enter the same credentials in Admin Panel → Config → TURN/STUN.

# TURN listener port
listening-port=3478

# Realm — set this to your domain (e.g. example.com)
realm=example.com

# Use fingerprint for TURN messages
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Static user credentials for TURN
# Format: username:password
# IMPORTANT: Change these and enter matching values in Admin Panel → Config → TURN/STUN
user=turnuser:change-me-in-production

# Total quota of allocations (0 = unlimited)
total-quota=100

# Max bytes-per-second bandwidth per session (0 = unlimited)
max-bps=0

# UDP relay port range (forward these + port 3478 on your router/firewall)
min-port=49152
max-port=49200

# Logging
log-file=stdout
verbose

# TLS — in production, uncomment and set paths to your cert/key:
# cert=/etc/ssl/turn_cert.pem
# pkey=/etc/ssl/turn_key.pem
no-tls
no-dtls

# Disallow multicast peers
no-multicast-peers
